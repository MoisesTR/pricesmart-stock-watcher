name: stock-check

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes (UTC; GitHub may delay a few min)
  workflow_dispatch:           # lets you run it manually from the Actions tab

concurrency:
  group: stock-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Restore the previous run's state.json (so we only alert on transitions).
      # The unique key + prefix restore-keys is the standard "evolving cache" trick:
      # save always writes a fresh entry, restore picks the most recent prior one.
      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: stock-state-${{ github.run_id }}
          restore-keys: |
            stock-state-

      - name: Install deps
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Check stock
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
          DEBUG_NOTIFY: ${{ vars.DEBUG_NOTIFY }}
        run: python check.py

      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: stock-state-${{ github.run_id }}
